policies:
  - id: block-request-secret-egress
    name: Block request secret egress
    groups: [default]
    enabled: false
    kind: content
    verdict: block
    reason: This policy blocks request content that appears to contain high-risk secrets.
    scope:
      directions: [request]
    match:
      patterns:
        - "sk-[A-Za-z0-9]{20,}"
        - "AKIA[0-9A-Z]{16}"
        - "ghp_[A-Za-z0-9]{20,}"
        - "github_pat_[A-Za-z0-9_]{20,}"
        - "xoxb-[0-9]+-[A-Za-z0-9-]+"
        - "0x[a-fA-F0-9]{64}"
        - "-----BEGIN [A-Z0-9 ]*PRIVATE KEY-----"
      pattern_mode: regex
      case_sensitive: true

  - id: block-request-dotenv-egress
    name: Block request dotenv egress
    groups: [default]
    enabled: false
    kind: content
    verdict: block
    reason: This policy blocks request content that looks like a dotenv or environment secret dump.
    scope:
      directions: [request]
    match:
      patterns:
        - OPENAI_API_KEY=
        - ANTHROPIC_API_KEY=
        - AWS_SECRET_ACCESS_KEY=
        - AWS_ACCESS_KEY_ID=
        - DATABASE_URL=
        - SLACK_BOT_TOKEN=
        - GITHUB_TOKEN=
      pattern_mode: substring
      case_sensitive: true
      min_matches: 2

  - id: block-request-cloud-credential-bundle
    name: Block request cloud credential bundles
    groups: [default]
    enabled: false
    kind: content
    verdict: block
    reason: This policy blocks request content that looks like bundled cloud credentials or private key material.
    scope:
      directions: [request]
    match:
      patterns:
        - aws_access_key_id
        - aws_secret_access_key
        - aws_session_token
        - -----BEGIN CERTIFICATE-----
        - -----BEGIN OPENSSH PRIVATE KEY-----
        - -----BEGIN RSA PRIVATE KEY-----
        - -----BEGIN EC PRIVATE KEY-----
        - -----BEGIN PRIVATE KEY-----
      pattern_mode: substring
      case_sensitive: false
      min_matches: 2

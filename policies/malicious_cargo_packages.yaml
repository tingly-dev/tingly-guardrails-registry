policies:
  - id: block-malicious-cargo-packages
    name: Block known malicious Cargo packages
    groups: [default]
    enabled: false
    kind: command_execution
    verdict: block
    reason: This policy blocks package names already reported as malicious in the OpenSSF Malicious Packages dataset for Cargo.
    match:
      tool_names: [bash]
      actions:
        include: [install]
      terms: [littest, replit_ruspty, rustdecimal]
